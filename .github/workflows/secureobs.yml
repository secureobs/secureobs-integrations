name: SecureObs Security Scan

on:
  workflow_call:
    inputs:
      project-id:
        description: 'SecureObs project ID'
        required: true
        type: string
      tenant-id:
        description: 'SecureObs tenant ID'
        required: true
        type: string
      image-tag:
        description: 'secureobs/scanner image tag'
        required: false
        type: string
        default: 'v1'
      fail-on-blocking:
        description: 'Fail the pipeline if blocking findings are detected'
        required: false
        type: boolean
        default: true
      pipeline-run-id:
        description: 'Optional run id override used by internal canary self-tests'
        required: false
        type: string
        default: ''
      expected-gate-exit-code:
        description: 'Optional internal canary assertion for the scanner gate exit code'
        required: false
        type: string
        default: ''
    secrets:
      api-key:
        description: 'SECUREOBS_API_KEY secret'
        required: true

jobs:
  scan:
    name: Run Semgrep + GitLeaks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Scan workspace
      env:
        SECUREOBS_API_KEY: ${{ secrets.api-key }}
        SECUREOBS_PIPELINE_RUN_ID: ${{ inputs['pipeline-run-id'] }}
        GITHUB_RUN_ID_FALLBACK: ${{ github.run_id }}
      run: |
        # Fail fast (clearer than a downstream 401) when the key is empty. The
        # calling workflow must map it under secrets: (api-key: <secret>); note
        # that 'secrets: inherit' does NOT populate the renamed 'api-key' secret.
        if [ -z "${SECUREOBS_API_KEY:-}" ]; then
          echo "::error::SECUREOBS_API_KEY is empty. Pass it from the caller under secrets: as 'api-key: <your SECUREOBS_API_KEY secret>'. 'secrets: inherit' will not populate it."
          exit 1
        fi
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -e SECUREOBS_API_KEY \
          secureobs/scanner:${{ inputs.image-tag }} \
          scan \
          --project-id "${{ inputs.project-id }}" \
          --tenant-id "${{ inputs.tenant-id }}" \
          --pipeline-run-id "${SECUREOBS_PIPELINE_RUN_ID:-$GITHUB_RUN_ID_FALLBACK}"

  gate:
    name: Build gate
    runs-on: ubuntu-latest
    needs: scan
    if: ${{ inputs.fail-on-blocking }}
    steps:
    - name: Run SecureObs gate
      id: gate
      env:
        SECUREOBS_API_KEY: ${{ secrets.api-key }}
        SECUREOBS_PIPELINE_RUN_ID: ${{ inputs['pipeline-run-id'] }}
        GITHUB_RUN_ID_FALLBACK: ${{ github.run_id }}
        SECUREOBS_EXPECTED_GATE_EXIT_CODE: ${{ inputs['expected-gate-exit-code'] }}
      run: |
        # Fail fast (clearer than a downstream 401) when the key is empty. The
        # calling workflow must map it under secrets: (api-key: <secret>); note
        # that 'secrets: inherit' does NOT populate the renamed 'api-key' secret.
        if [ -z "${SECUREOBS_API_KEY:-}" ]; then
          echo "::error::SECUREOBS_API_KEY is empty. Pass it from the caller under secrets: as 'api-key: <your SECUREOBS_API_KEY secret>'. 'secrets: inherit' will not populate it."
          exit 1
        fi
        set +e
        docker run --rm \
          -e SECUREOBS_API_KEY \
          secureobs/scanner:${{ inputs.image-tag }} \
          gate \
          --project-id "${{ inputs.project-id }}" \
          --tenant-id "${{ inputs.tenant-id }}" \
          --pipeline-run-id "${SECUREOBS_PIPELINE_RUN_ID:-$GITHUB_RUN_ID_FALLBACK}"
        code=$?
        set -e
        if [ -n "$SECUREOBS_EXPECTED_GATE_EXIT_CODE" ]; then
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        exit "$code"

    - name: Fail workflow with expected SecureObs gate block
      if: ${{ inputs['expected-gate-exit-code'] != '' && steps.gate.outputs.code == inputs['expected-gate-exit-code'] }}
      env:
        SECUREOBS_EXPECTED_GATE_EXIT_CODE: ${{ inputs['expected-gate-exit-code'] }}
      run: exit "$SECUREOBS_EXPECTED_GATE_EXIT_CODE"

    - name: Unexpected scanner exit code
      if: ${{ inputs['expected-gate-exit-code'] != '' && steps.gate.outputs.code != inputs['expected-gate-exit-code'] }}
      env:
        SECUREOBS_EXPECTED_GATE_EXIT_CODE: ${{ inputs['expected-gate-exit-code'] }}
        SECUREOBS_ACTUAL_GATE_EXIT_CODE: ${{ steps.gate.outputs.code }}
      run: |
        echo "::error::Expected SecureObs gate to exit $SECUREOBS_EXPECTED_GATE_EXIT_CODE, got $SECUREOBS_ACTUAL_GATE_EXIT_CODE."
        exit 1

  pr-comment:
    name: Post PR comment
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
    - name: Post PR comment
      env:
        SECUREOBS_API_KEY: ${{ secrets.api-key }}
        SECUREOBS_PIPELINE_RUN_ID: ${{ inputs['pipeline-run-id'] }}
        GITHUB_RUN_ID_FALLBACK: ${{ github.run_id }}
      run: |
        # Fail fast (clearer than a downstream 401) when the key is empty. The
        # calling workflow must map it under secrets: (api-key: <secret>); note
        # that 'secrets: inherit' does NOT populate the renamed 'api-key' secret.
        if [ -z "${SECUREOBS_API_KEY:-}" ]; then
          echo "::error::SECUREOBS_API_KEY is empty. Pass it from the caller under secrets: as 'api-key: <your SECUREOBS_API_KEY secret>'. 'secrets: inherit' will not populate it."
          exit 1
        fi
        docker run --rm \
          -e SECUREOBS_API_KEY \
          -e GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
          -e GITHUB_REF="${{ github.ref }}" \
          secureobs/scanner:${{ inputs.image-tag }} \
          pr-comment \
          --project-id "${{ inputs.project-id }}" \
          --tenant-id "${{ inputs.tenant-id }}" \
          --pipeline-run-id "${SECUREOBS_PIPELINE_RUN_ID:-$GITHUB_RUN_ID_FALLBACK}" \
          --platform github
