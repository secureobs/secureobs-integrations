name: SecureObs Security Scan

on:
  workflow_call:
    inputs:
      project-id:
        description: 'SecureObs project ID'
        required: true
        type: string
      tenant-id:
        description: 'SecureObs tenant ID'
        required: true
        type: string
      image-tag:
        description: 'secureobs/scanner image tag'
        required: false
        type: string
        default: 'v1'
      fail-on-blocking:
        description: 'Fail the pipeline if blocking findings are detected'
        required: false
        type: boolean
        default: true
    secrets:
      api-key:
        description: 'SECUREOBS_API_KEY secret'
        required: true

jobs:
  scan:
    name: Run Semgrep + GitLeaks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Scan workspace
      env:
        SECUREOBS_API_KEY: ${{ secrets.api-key }}
      run: |
        # Fail fast (clearer than a downstream 401) when the key is empty. The
        # calling workflow must map it under secrets: (api-key: <secret>); note
        # that 'secrets: inherit' does NOT populate the renamed 'api-key' secret.
        if [ -z "${SECUREOBS_API_KEY:-}" ]; then
          echo "::error::SECUREOBS_API_KEY is empty. Pass it from the caller under secrets: as 'api-key: <your SECUREOBS_API_KEY secret>'. 'secrets: inherit' will not populate it."
          exit 1
        fi
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -e SECUREOBS_API_KEY \
          secureobs/scanner:${{ inputs.image-tag }} \
          scan \
          --project-id "${{ inputs.project-id }}" \
          --tenant-id "${{ inputs.tenant-id }}" \
          --pipeline-run-id "${{ github.run_id }}"

  gate:
    name: Build gate
    runs-on: ubuntu-latest
    needs: scan
    if: ${{ inputs.fail-on-blocking }}
    steps:
    - name: Check for blocking findings
      env:
        SECUREOBS_API_KEY: ${{ secrets.api-key }}
      run: |
        # Fail fast (clearer than a downstream 401) when the key is empty. The
        # calling workflow must map it under secrets: (api-key: <secret>); note
        # that 'secrets: inherit' does NOT populate the renamed 'api-key' secret.
        if [ -z "${SECUREOBS_API_KEY:-}" ]; then
          echo "::error::SECUREOBS_API_KEY is empty. Pass it from the caller under secrets: as 'api-key: <your SECUREOBS_API_KEY secret>'. 'secrets: inherit' will not populate it."
          exit 1
        fi
        docker run --rm \
          -e SECUREOBS_API_KEY \
          secureobs/scanner:${{ inputs.image-tag }} \
          gate \
          --project-id "${{ inputs.project-id }}" \
          --tenant-id "${{ inputs.tenant-id }}" \
          --pipeline-run-id "${{ github.run_id }}"

  pr-comment:
    name: Post PR comment
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
    - name: Post PR comment
      env:
        SECUREOBS_API_KEY: ${{ secrets.api-key }}
      run: |
        # Fail fast (clearer than a downstream 401) when the key is empty. The
        # calling workflow must map it under secrets: (api-key: <secret>); note
        # that 'secrets: inherit' does NOT populate the renamed 'api-key' secret.
        if [ -z "${SECUREOBS_API_KEY:-}" ]; then
          echo "::error::SECUREOBS_API_KEY is empty. Pass it from the caller under secrets: as 'api-key: <your SECUREOBS_API_KEY secret>'. 'secrets: inherit' will not populate it."
          exit 1
        fi
        docker run --rm \
          -e SECUREOBS_API_KEY \
          -e GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
          -e GITHUB_REF="${{ github.ref }}" \
          secureobs/scanner:${{ inputs.image-tag }} \
          pr-comment \
          --project-id "${{ inputs.project-id }}" \
          --tenant-id "${{ inputs.tenant-id }}" \
          --pipeline-run-id "${{ github.run_id }}" \
          --platform github
