parameters:
- name: projectId
  type: string
- name: tenantId
  type: string
- name: imageTag
  type: string
  default: 'v1'
- name: failOnBlocking
  type: boolean
  default: true
- name: pipelineRunId
  type: string
  default: ''
- name: expectedGateExitCode
  type: string
  default: ''

# Why every templated parameter is passed through `env:` and referenced as
# "$VAR" inside the script (including the image tag):
#
# Azure DevOps expands template-expression parameters (${{ parameters.* }})
# at compile time. If a parameter contains a shell metacharacter (`, $(...),
# &&, ; …) it becomes shell code in the final pipeline. Assigning the value
# to an environment variable and referencing it as "$VAR" in the script lets
# the shell receive it as a single argument string — shell expansion is
# never re-applied to it. This is the standard mitigation for CWE-78 in
# pipeline templates.

stages:
- stage: SecureObs_Scan
  displayName: 'SecureObs Security Scan'
  jobs:

  - job: Scan
    displayName: 'Run Security Modules: SAST + Secrets + SCA + IaC + Container'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    - script: |
        # Fail fast (clearer than a downstream 401) when the key is empty or
        # still the unexpanded macro literal — i.e. the SECUREOBS_API_KEY secret
        # variable, or the variable group that holds it, is not linked to this
        # pipeline. Azure DevOps does not auto-expose secret variables to scripts.
        case "${SECUREOBS_API_KEY:-}" in
          ''|*SECUREOBS_API_KEY*)
            echo "##vso[task.logissue type=error]SECUREOBS_API_KEY is not set on this pipeline. Add it as a secret variable, or link the variable group that holds it (Project settings -> Pipelines -> Library), then re-run. See docs/quickstart-azure-devops.md."
            exit 1
            ;;
        esac
        docker run --rm \
          -v "$(Build.SourcesDirectory):/workspace" \
          -e SECUREOBS_API_KEY \
          "secureobs/scanner:$SECUREOBS_IMAGE_TAG" \
          scan \
          --project-id "$SECUREOBS_PROJECT_ID" \
          --tenant-id "$SECUREOBS_TENANT_ID" \
          --pipeline-run-id "${SECUREOBS_PIPELINE_RUN_ID:-$BUILD_BUILDID}"
      displayName: 'Scan workspace (Semgrep, ESLint, Bandit, Gitleaks, OSV-Scanner, Checkov, Trivy)'
      env:
        SECUREOBS_API_KEY: $(SECUREOBS_API_KEY)
        SECUREOBS_PROJECT_ID: ${{ parameters.projectId }}
        SECUREOBS_TENANT_ID: ${{ parameters.tenantId }}
        SECUREOBS_IMAGE_TAG: ${{ parameters.imageTag }}
        SECUREOBS_PIPELINE_RUN_ID: ${{ parameters.pipelineRunId }}
        BUILD_BUILDID: $(Build.BuildId)

  - job: PrComment
    displayName: 'Post PR comment'
    dependsOn: Scan
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    continueOnError: true
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: |
        # Fail fast (clearer than a downstream 401) when the key is empty or
        # still the unexpanded macro literal — i.e. the SECUREOBS_API_KEY secret
        # variable, or the variable group that holds it, is not linked to this
        # pipeline. Azure DevOps does not auto-expose secret variables to scripts.
        case "${SECUREOBS_API_KEY:-}" in
          ''|*SECUREOBS_API_KEY*)
            echo "##vso[task.logissue type=error]SECUREOBS_API_KEY is not set on this pipeline. Add it as a secret variable, or link the variable group that holds it (Project settings -> Pipelines -> Library), then re-run. See docs/quickstart-azure-devops.md."
            exit 1
            ;;
        esac
        docker run --rm \
          -e SECUREOBS_API_KEY \
          -e SYSTEM_ACCESSTOKEN="$SYSTEM_ACCESSTOKEN" \
          -e SYSTEM_PULLREQUEST_PULLREQUESTID="$SYSTEM_PULLREQUEST_PULLREQUESTID" \
          -e BUILD_REPOSITORY_ID="$BUILD_REPOSITORY_ID" \
          -e SYSTEM_TEAMPROJECT="$SYSTEM_TEAMPROJECT" \
          -e SYSTEM_TEAMFOUNDATIONCOLLECTIONURI="$SYSTEM_TEAMFOUNDATIONCOLLECTIONURI" \
          "secureobs/scanner:$SECUREOBS_IMAGE_TAG" \
          pr-comment \
          --project-id "$SECUREOBS_PROJECT_ID" \
          --tenant-id "$SECUREOBS_TENANT_ID" \
          --pipeline-run-id "${SECUREOBS_PIPELINE_RUN_ID:-$BUILD_BUILDID}" \
          --platform azuredevops
      displayName: 'Post PR comment'
      env:
        SECUREOBS_API_KEY: $(SECUREOBS_API_KEY)
        SECUREOBS_PROJECT_ID: ${{ parameters.projectId }}
        SECUREOBS_TENANT_ID: ${{ parameters.tenantId }}
        SECUREOBS_IMAGE_TAG: ${{ parameters.imageTag }}
        SECUREOBS_PIPELINE_RUN_ID: ${{ parameters.pipelineRunId }}
        BUILD_BUILDID: $(Build.BuildId)
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
        SYSTEM_PULLREQUEST_PULLREQUESTID: $(System.PullRequest.PullRequestId)
        BUILD_REPOSITORY_ID: $(Build.Repository.ID)
        SYSTEM_TEAMPROJECT: $(System.TeamProject)
        SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)

  - job: Gate
    displayName: 'Build gate'
    dependsOn: [Scan, PrComment]
    condition: |
      and(
        eq(dependencies.Scan.result, 'Succeeded'),
        in(dependencies.PrComment.result, 'Succeeded', 'Skipped', 'SucceededWithIssues', 'Failed'),
        eq('${{ parameters.failOnBlocking }}', 'true')
      )
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: |
        # Fail fast (clearer than a downstream 401) when the key is empty or
        # still the unexpanded macro literal — i.e. the SECUREOBS_API_KEY secret
        # variable, or the variable group that holds it, is not linked to this
        # pipeline. Azure DevOps does not auto-expose secret variables to scripts.
        case "${SECUREOBS_API_KEY:-}" in
          ''|*SECUREOBS_API_KEY*)
            echo "##vso[task.logissue type=error]SECUREOBS_API_KEY is not set on this pipeline. Add it as a secret variable, or link the variable group that holds it (Project settings -> Pipelines -> Library), then re-run. See docs/quickstart-azure-devops.md."
            exit 1
            ;;
        esac
        set +e
        docker run --rm \
          -e SECUREOBS_API_KEY \
          "secureobs/scanner:$SECUREOBS_IMAGE_TAG" \
          gate \
          --project-id "$SECUREOBS_PROJECT_ID" \
          --tenant-id "$SECUREOBS_TENANT_ID" \
          --pipeline-run-id "${SECUREOBS_PIPELINE_RUN_ID:-$BUILD_BUILDID}"
        code=$?
        set -e
        if [ -n "$SECUREOBS_EXPECTED_GATE_EXIT_CODE" ]; then
          echo "##vso[task.setvariable variable=SECUREOBS_GATE_EXIT_CODE]$code"
          exit 0
        fi
        exit "$code"
      displayName: 'Run SecureObs gate'
      env:
        SECUREOBS_API_KEY: $(SECUREOBS_API_KEY)
        SECUREOBS_PROJECT_ID: ${{ parameters.projectId }}
        SECUREOBS_TENANT_ID: ${{ parameters.tenantId }}
        SECUREOBS_IMAGE_TAG: ${{ parameters.imageTag }}
        SECUREOBS_PIPELINE_RUN_ID: ${{ parameters.pipelineRunId }}
        SECUREOBS_EXPECTED_GATE_EXIT_CODE: ${{ parameters.expectedGateExitCode }}
        BUILD_BUILDID: $(Build.BuildId)
    - script: exit "$SECUREOBS_EXPECTED_GATE_EXIT_CODE"
      displayName: 'Expected SecureObs gate block'
      condition: and(succeeded(), ne('${{ parameters.expectedGateExitCode }}', ''), eq(variables['SECUREOBS_GATE_EXIT_CODE'], '${{ parameters.expectedGateExitCode }}'))
      env:
        SECUREOBS_EXPECTED_GATE_EXIT_CODE: ${{ parameters.expectedGateExitCode }}
    - script: |
        echo "##vso[task.logissue type=error]Expected SecureObs gate to exit $SECUREOBS_EXPECTED_GATE_EXIT_CODE, got $SECUREOBS_GATE_EXIT_CODE."
        exit 1
      displayName: 'Unexpected scanner exit code'
      condition: and(succeeded(), ne('${{ parameters.expectedGateExitCode }}', ''), ne(variables['SECUREOBS_GATE_EXIT_CODE'], '${{ parameters.expectedGateExitCode }}'))
      env:
        SECUREOBS_EXPECTED_GATE_EXIT_CODE: ${{ parameters.expectedGateExitCode }}
        SECUREOBS_GATE_EXIT_CODE: $(SECUREOBS_GATE_EXIT_CODE)
